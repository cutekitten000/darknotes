<div class="h-screen w-screen bg-surface flex flex-col">
  
  <header class="h-12 bg-surface-2 border-b border-border flex items-center justify-between px-4 shrink-0">
    <div class="flex items-center gap-3">
      
      <button
        (click)="toggleSidebar()"
        class="text-text-muted hover:text-accent transition-colors p-1"
        aria-label="Alternar sidebar"
      >
        @if (sidebarOpen()) {
          
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        } @else {
          
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        }
      </button>
      <span class="text-base font-semibold text-text">DarkNotes</span>
    </div>
    <button
      (click)="onLogout()"
      [disabled]="isLoggingOut()"
      class="text-sm text-text-muted hover:text-accent transition-colors disabled:opacity-50 flex items-center gap-1.5"
    >
      @if (isLoggingOut()) {
        <span class="inline-block w-3 h-3 border-2 border-text-muted border-t-transparent rounded-full animate-spin"></span>
      }
      {{ isLoggingOut() ? 'Saindo...' : 'Sair' }}
    </button>
  </header>

  
  <div class="flex flex-1 overflow-hidden">
    
    @if (sidebarOpen()) {
      <div
        class="fixed inset-0 bg-black/40 z-30 md:hidden"
        (click)="toggleSidebar()"
        aria-hidden="true"
      ></div>
    }

    
    <aside
      class="bg-surface-2 shrink-0 flex flex-col transition-all duration-200
             md:relative max-md:fixed max-md:inset-y-0 max-md:left-0 max-md:z-40"
      [class.w-[260px]]="sidebarOpen()"
      [class.md:border-r]="sidebarOpen()"
      [class.md:border-border]="sidebarOpen()"
      [class.overflow-y-auto]="sidebarOpen()"
      [class.w-0]="!sidebarOpen()"
      [class.overflow-hidden]="!sidebarOpen()"
      [class.max-md:w-[280px]]="sidebarOpen()"
      [class.max-md:translate-x-0]="sidebarOpen()"
      [class.max-md:-translate-x-full]="!sidebarOpen()"
    >
      <app-folder-list-header (createRoot)="folderTree.onCreateRoot()" />
      <app-folder-tree #folderTree />
    </aside>

    
    <main class="flex-1 bg-surface overflow-y-auto min-w-0">
      <router-outlet />
    </main>
  </div>

  
  <app-quick-open
    [isVisible]="quickOpenVisible()"
    (close)="onQuickOpenClose()"
  />
</div>
