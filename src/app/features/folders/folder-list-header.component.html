<div class="flex items-center justify-between px-4 h-12 border-b border-border shrink-0">
  <h2 class="text-xs font-semibold text-text-muted uppercase tracking-wider">Pastas</h2>
  <div class="flex items-center gap-0.5">
    @if (rootFolders().length > 0) {
      <button
        (click)="onCreateRootNote()"
        class="text-text-muted hover:text-accent p-1 transition-colors"
        aria-label="Criar nota"
      >
        <svg lucideFilePlus class="w-4 h-4"></svg>
      </button>
    }
    <button
      (click)="onCreateRoot()"
      class="text-accent hover:text-accent-light p-1 transition-colors"
      aria-label="Criar pasta na raiz"
    >
      <svg lucidePlus class="w-4 h-4"></svg>
    </button>
  </div>
</div>

<app-create-note-dialog
  [folderId]="createNoteFolderId()"
  [isVisible]="showCreateNoteDialog()"
  (close)="onCloseCreateDialog()"
/>
