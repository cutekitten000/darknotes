<main class="h-screen w-screen bg-surface flex items-center justify-center">
  <div class="bg-surface-2 rounded-[4px] w-full max-w-[400px] p-8 max-sm:p-4">
    
    <h1 class="text-display font-semibold text-accent text-center">DarkNotes</h1>
    <p class="text-sm text-text-muted text-center mb-8">Caderno de estudos para programação</p>

    
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label for="email" class="block text-sm text-text mb-2">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          (blur)="onEmailBlur()"
          #emailModel="ngModel"
          required
          email
          maxlength="254"
          autocomplete="email"
          placeholder="seu@email.com"
          class="w-full bg-surface-3 border border-border rounded-[4px] px-4 py-2.5 text-sm text-text placeholder:text-[#666666] focus:outline-none focus:ring-2 focus:ring-accent transition-colors"
          [class.border-destructive]="emailFieldTouched() && emailModel.invalid"
          [disabled]="isSubmitting()"
        />
        @if (emailFieldTouched() && emailModel.invalid) {
          <p class="text-xs text-destructive mt-1">Informe um email válido</p>
        }
      </div>

      
      <div>
        <label for="password" class="block text-sm text-text mb-2">Senha</label>
        <input
          id="password"
          type="password"
          name="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          (blur)="onPasswordBlur()"
          #passwordModel="ngModel"
          required
          minlength="6"
          maxlength="128"
          autocomplete="current-password"
          placeholder="••••••••"
          class="w-full bg-surface-3 border border-border rounded-[4px] px-4 py-2.5 text-sm text-text placeholder:text-[#666666] focus:outline-none focus:ring-2 focus:ring-accent transition-colors"
          [class.border-destructive]="passwordFieldTouched() && passwordModel.invalid"
          [disabled]="isSubmitting()"
        />
        @if (passwordFieldTouched() && passwordModel.invalid) {
          <p class="text-xs text-destructive mt-1">A senha deve ter no mínimo 6 caracteres</p>
        }
      </div>

      
      @if (inlineError()) {
        <div class="text-sm text-destructive text-center">
          <p>{{ inlineErrorMessage() }}</p>
          <button
            type="button"
            (click)="onRetry()"
            class="text-accent hover:text-accent-light underline mt-1"
          >
            Tentar novamente
          </button>
        </div>
      }

      
      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="w-full bg-accent hover:bg-accent-light active:bg-accent-dark text-white font-semibold rounded-[4px] px-4 py-2.5 text-sm disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 transition-colors"
      >
        @if (isSubmitting()) {
          <span class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        }
        {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</main>
