<div class="h-full flex flex-col bg-surface">
  
  <div class="h-11 bg-surface-2 border-b border-border flex items-center justify-between px-4 shrink-0">
    <div class="flex items-center gap-3">
      
      <button
        (click)="goBack()"
        class="text-text-muted hover:text-text transition-colors text-sm flex items-center gap-1"
      >
        ← Voltar
      </button>
    </div>

    <div class="flex items-center gap-2 md:gap-3">
      
      <button
        (click)="exportNote()"
        class="text-xs text-text-muted hover:text-text px-2 py-1 rounded-[4px] transition-colors flex items-center gap-1"
        title="Exportar como .md"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span class="hidden md:inline">.md</span>
      </button>

      
      <button
        (click)="togglePreview()"
        class="text-xs text-text-muted hover:text-text bg-surface-3 px-2.5 py-1 rounded-[4px] transition-colors"
      >
        {{ showingPreview() ? 'Editar' : 'Preview' }}
      </button>

      
      @if (saveStatus()) {
        <span
          class="text-xs"
          [class.text-success]="saveStatus() === 'Salvo'"
          [class.text-text-muted]="saveStatus() === 'Não salvo'"
          [class.text-accent]="saveStatus() === 'Salvando...'"
        >
          {{ saveStatus() }}
        </span>
      }

      
      @if (!showingPreview()) {
        <button
          (click)="onSave()"
          [disabled]="store.isSaving() || !store.isDirty()"
          class="bg-accent hover:bg-accent-light disabled:opacity-40 disabled:cursor-not-allowed text-text-on-accent text-sm px-4 py-1.5 rounded-[4px] transition-colors flex items-center gap-1.5"
        >
          @if (store.isSaving()) {
            <span class="inline-block w-3 h-3 border-2 border-text-on-accent border-t-transparent rounded-full animate-spin"></span>
          }
          Salvar
        </button>
      }
    </div>
  </div>

  
  <input
    [ngModel]="store.draft().title"
    (ngModelChange)="store.updateDraftTitle($event)"
    placeholder="Título da nota..."
    class="w-full bg-surface text-text text-base font-medium px-4 py-3 border-b border-border focus:outline-none placeholder:text-text-muted"
  />

  
  <div class="flex-1 overflow-hidden">
    @if (!showingPreview()) {
      
      <textarea
        [ngModel]="store.draft().content"
        (ngModelChange)="store.updateDraftContent($event)"
        (keydown)="onEditorKeydown($event)"
        (paste)="onPaste($event)"
        placeholder="Escreva sua nota em markdown..."
        class="w-full h-full bg-surface text-text text-sm p-4 resize-none focus:outline-none font-mono leading-relaxed"
      ></textarea>
    } @else {
      
      <div class="h-full overflow-y-auto p-4">
        @if (store.draft().content || store.draft().title) {
          <article class="markdown-preview">
            <markdown
              [data]="store.draft().content"
              lineNumbers
            />
          </article>
        } @else {
          <div class="flex items-center justify-center h-full">
            <p class="text-text-muted text-sm">Escreva algo no editor para ver o preview...</p>
          </div>
        }
      </div>
    }
  </div>
</div>
